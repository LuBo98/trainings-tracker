services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: training-tracker
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/trainingdb
      DB_USERNAME: training
      DB_PASSWORD: training123
      DB_DRIVER: org.postgresql.Driver
      MAIL_ENABLED: "false"
      BASE_URL: https://lubo-software.de
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: training-tracker-db
    environment:
      POSTGRES_DB: trainingdb
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training -d trainingdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
