server:
  port: 8080

spring:
  application:
    name: training-tracker

  # Database - uses PostgreSQL via env vars, falls back to H2 for local dev
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/trainingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8

  # Gmail SMTP configuration (read from .env file)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

app:
  mail:
    enabled: ${MAIL_ENABLED:true}
  base-url: ${BASE_URL:http://localhost:8080}

logging:
  level:
    com.trainingtracker: DEBUG
    org.springframework.security: DEBUG
