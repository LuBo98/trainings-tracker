<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout eintragen - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/nav.js}" defer></script>
    <style>
        .workout-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 768px) {
            .workout-form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container">
        <h1 class="mb-2">Workout eintragen: <span th:text="${exercise.name}"></span></h1>
        <div class="card">
            <form th:action="@{/workouts/log}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="exerciseId" th:value="${exercise.id}">
                <div class="form-group">
                    <label for="workoutDate">Datum</label>
                    <input type="date" id="workoutDate" name="workoutDate" class="form-control" required th:value="${todayDate}">
                </div>
                <div class="workout-form-grid">
                    <div class="form-group">
                        <label for="sets">Sets</label>
                        <input type="number" id="sets" name="sets" class="form-control" required min="1" max="100" 
                               th:value="${lastSets != null ? lastSets : 3}">
                    </div>
                    <div class="form-group">
                        <label for="reps">Wiederholungen</label>
                        <input type="number" id="reps" name="reps" class="form-control" required min="1" max="200"
                               th:value="${lastReps != null ? lastReps : 10}">
                    </div>
                    <div class="form-group">
                        <label for="weight">Gewicht (kg)</label>
                        <input type="number" id="weight" name="weight" class="form-control" required min="0" step="0.5"
                               th:value="${lastWeight != null ? lastWeight : 0}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="notes">Notizen (optional)</label>
                    <textarea id="notes" name="notes" class="form-control" maxlength="500" placeholder="z.B. Gefuehl, Technik, Kommentare..."></textarea>
                </div>
                <div class="form-group">
                    <label>Anstrengung</label>
                    <div class="difficulty-scale">
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="1">
                            <span class="difficulty-label">Einfach</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="2">
                            <span class="difficulty-label">Moderat</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="3" checked>
                            <span class="difficulty-label">Anstrengend</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="4">
                            <span class="difficulty-label">Sehr anstrengend</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="5">
                            <span class="difficulty-label">Nicht geschafft</span>
                        </label>
                    </div>
                </div>
                <div class="d-flex gap-1">
                    <button type="submit" class="btn btn-success">Eintragen</button>
                    <a th:href="@{'/exercises/category/' + ${exercise.category.id}}" class="btn btn-outline">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
