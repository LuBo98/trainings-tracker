<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout bearbeiten - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/nav.js}" defer></script>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container">
        <div class="d-flex justify-between align-center mb-2">
            <h1>Workout bearbeiten: <span th:text="${category.name}"></span></h1>
            <a th:href="@{/workouts}" class="btn btn-outline">Abbrechen</a>
        </div>

        <form th:action="@{/workouts/edit}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="categoryId" th:value="${category.id}">
            <input type="hidden" name="workoutDate" th:value="${workoutDate}">

            <div class="card">
                <div class="card-header">
                    <span th:text="${#temporals.format(workoutDate, 'dd.MM.yyyy')}"></span>
                </div>
                <div style="padding:0;">
                    <div class="table-responsive">
                        <table class="table" style="margin-bottom:0;">
                            <thead>
                                <tr>
                                    <th style="width:30%;">Uebung</th>
                                    <th style="width:15%;">Sets</th>
                                    <th style="width:15%;">Wdh.</th>
                                    <th style="width:15%;">Gewicht (kg)</th>
                                    <th style="width:25%;">Anstrengung</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="exercise : ${exercises}">
                                    <td><strong th:text="${exercise.name}"></strong></td>
                                    <td>
                                        <!-- Find existing entry for this exercise -->
                                        <input type="number" th:name="'sets_' + ${exercise.id}"
                                               class="form-control bulk-input" min="1" placeholder="0"
                                               style="width:80px;"
                                               th:value="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].sets : ''}"/>
                                    </td>
                                    <td>
                                        <input type="number" th:name="'reps_' + ${exercise.id}"
                                               class="form-control bulk-input" min="1" placeholder="0"
                                               style="width:80px;"
                                               th:value="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].reps : ''}"/>
                                    </td>
                                    <td>
                                        <input type="number" th:name="'weight_' + ${exercise.id}"
                                               class="form-control bulk-input" min="0" step="0.5" placeholder="0"
                                               style="width:80px;"
                                               th:value="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].weight : ''}"/>
                                    </td>
                                    <td>
                                        <div class="difficulty-scale" style="padding:0.25rem; gap:0.25rem;">
                                            <label class="difficulty-radio" style="padding:0.25rem 0.5rem; font-size:0.8rem;">
                                                <input type="radio" th:name="'diff_' + ${exercise.id}" th:value="1" style="display:none;"
                                                       th:checked="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].difficulty == 1 : false}">
                                                1
                                            </label>
                                            <label class="difficulty-radio" style="padding:0.25rem 0.5rem; font-size:0.8rem;">
                                                <input type="radio" th:name="'diff_' + ${exercise.id}" th:value="2" style="display:none;"
                                                       th:checked="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].difficulty == 2 : false}">
                                                2
                                            </label>
                                            <label class="difficulty-radio" style="padding:0.25rem 0.5rem; font-size:0.8rem;">
                                                <input type="radio" th:name="'diff_' + ${exercise.id}" th:value="3" checked style="display:none;"
                                                       th:checked="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].difficulty == 3 : true}">
                                                3
                                            </label>
                                            <label class="difficulty-radio" style="padding:0.25rem 0.5rem; font-size:0.8rem;">
                                                <input type="radio" th:name="'diff_' + ${exercise.id}" th:value="4" style="display:none;"
                                                       th:checked="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].difficulty == 4 : false}">
                                                4
                                            </label>
                                            <label class="difficulty-radio" style="padding:0.25rem 0.5rem; font-size:0.8rem;">
                                                <input type="radio" th:name="'diff_' + ${exercise.id}" th:value="5" style="display:none;"
                                                       th:checked="${entries.?[exercise.id == exercise.id]!{}.isEmpty() ? entries.?[exercise.id == exercise.id]![0].difficulty == 5 : false}">
                                                5
                                            </label>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-1 mt-2">
                <button type="submit" class="btn btn-success">Speichern</button>
                <a th:href="@{/workouts}" class="btn btn-outline">Abbrechen</a>
            </div>
        </form>
    </div>

    <script>
        // Difficulty scale click handler for bulk form
        document.querySelectorAll('.difficulty-scale').forEach(function(scale) {
            scale.querySelectorAll('.difficulty-radio').forEach(function(radio) {
                if (radio.querySelector('input').checked) {
                    radio.style.background = 'var(--primary)';
                    radio.style.color = 'white';
                }
                radio.addEventListener('click', function() {
                    scale.querySelectorAll('.difficulty-radio').forEach(function(r) {
                        r.style.background = 'transparent';
                        r.style.color = '';
                    });
                    radio.style.background = 'var(--primary)';
                    radio.style.color = 'white';
                    radio.querySelector('input').checked = true;
                });
            });
        });
    </script>
</body>
</html>
