<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout-Verlauf - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/nav.js}" defer></script>
    <style>
        .category-section { margin-bottom: 1.5rem; }
        .category-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: var(--card-bg, white);
            border-radius: 0.5rem; cursor: pointer;
            border: 1px solid var(--border-color, #e5e7eb);
            font-size: 1.25rem; font-weight: 600;
        }
        .category-header:hover { background: var(--hover-bg, #f3f4f6); }
        .category-toggle { font-size: 1.2rem; transition: transform 0.2s; }
        .category-toggle.open { transform: rotate(90deg); }
        .workout-entries { display: none; margin-top: 0.5rem; }
        .workout-entries.visible { display: block; }
        .workout-card {
            margin-bottom: 1rem; padding: 1rem;
            background: var(--card-bg, white); border-radius: 0.5rem;
            border: 1px solid var(--border-color, #e5e7eb);
            border-left: 4px solid var(--primary-color, #2563eb);
        }
        .workout-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.75rem; padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color, #e5e7eb);
        }
        .workout-date { font-weight: 600; color: var(--primary-color, #2563eb); }
        .workout-actions { display: flex; gap: 0.5rem; }
        .exercise-entry {
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 0.5rem; padding: 0.375rem 0;
            font-size: 0.9rem; align-items: center;
        }
        .exercise-name { font-weight: 500; }
        .difficulty-badge {
            padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem;
        }
        .difficulty-1 { background: #dcfce7; color: #166534; }
        .difficulty-2 { background: #fef3c7; color: #92400e; }
        .difficulty-3 { background: #ffedd5; color: #c2410c; }
        .difficulty-4 { background: #fee2e2; color: #991b1b; }
        .difficulty-5 { background: #f3e8ff; color: #7c3aed; }

        @media (max-width: 768px) {
            .exercise-entry {
                grid-template-columns: 1fr 1fr auto;
                gap: 0.25rem;
                padding: 0.5rem 0;
            }
        }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container">
        <div th:replace="~{fragments/navbar :: alerts}"></div>
        <h1 class="mb-2">Workout-Verlauf</h1>

        <div th:if="${#maps.isEmpty(workoutsByCategory)}" class="card text-center">
            <p>Noch keine Workouts eingetragen. Traegt dein erstes Workout ein!</p>
            <a th:href="@{/workouts/bulk-landing}" class="btn btn-primary mt-1">Workout eintragen</a>
        </div>

        <div th:each="catEntry : ${workoutsByCategory}" class="category-section">
            <div class="category-header" onclick="toggleCategory(this)">
                <div>
                    <span th:text="${catEntry.key.name}"></span>
                    <small style="color:var(--gray-500); font-weight:normal;">
                        (<span th:text="${#maps.size(catEntry.value)}"></span> Workouts)
                    </small>
                </div>
                <span class="category-toggle">▶</span>
            </div>

            <div class="workout-entries">
                <!-- Each workout = all entries of one day -->
                <div th:each="dateEntry : ${catEntry.value}" class="workout-card">
                    <div class="workout-header">
                        <span class="workout-date" th:text="${#temporals.format(dateEntry.key, 'dd.MM.yyyy')}"></span>
                        <div class="workout-actions">
                            <a th:href="@{'/workouts/edit?(categoryId=' + ${catEntry.key.id} + ',date=' + ${dateEntry.key} + ')'}"
                               class="btn btn-outline btn-sm" title="Workout bearbeiten">✎</a>
                            <a th:href="@{'/workouts/delete?(categoryId=' + ${catEntry.key.id} + ',date=' + ${dateEntry.key} + ')'}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Ganzes Workout fuer diesen Tag wirklich loeschen?');"
                                   title="Workout loeschen">✕</a>
                        </div>
                    </div>
                    <!-- Exercise entries for this workout -->
                    <div th:each="entry : ${dateEntry.value}" class="exercise-entry">
                        <span class="exercise-name" th:text="${entry.exercise.name}"></span>
                        <span><span th:text="${entry.sets}"></span> x <span th:text="${entry.reps}"></span></span>
                        <span th:text="${entry.weight} + ' kg'"></span>
                        <span th:text="${entry.sets * entry.reps * entry.weight} + ' kg'"></span>
                        <span>
                            <span class="difficulty-badge"
                                  th:classappend="'difficulty-' + ${entry.difficulty}"
                                  th:text="${entry.difficulty == 1 ? 'Einfach' : (entry.difficulty == 2 ? 'Moderat' : (entry.difficulty == 3 ? 'Anstrengend' : (entry.difficulty == 4 ? 'Sehr anstrengend' : 'Nicht geschafft')))}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleCategory(header) {
            const entries = header.nextElementSibling;
            const toggle = header.querySelector('.category-toggle');
            entries.classList.toggle('visible');
            toggle.classList.toggle('open');
        }
    </script>
</body>
</html>
