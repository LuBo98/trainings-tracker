<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" th:href="@{/dashboard}">Training Tracker</a>
        <ul class="navbar-nav">
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/categories}">Kategorien</a></li>
            <li><a th:href="@{/workouts}">Workouts</a></li>
            <li><a th:href="@{/stats}">Statistik</a></li>
            <li><form th:action="@{/auth/logout}" method="post" style="display:inline;"><button type="submit" class="btn btn-outline btn-sm">Logout</button></form></li>
        </ul>
    </nav>
    <div class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <h1 class="mb-2">Workout-Verlauf</h1>
        <div th:if="${#lists.isEmpty(workouts)}" class="card text-center">
            <p>Noch keine Workouts eingetragen. Traegt dein erstes Workout ein!</p>
            <a th:href="@{/categories}" class="btn btn-primary mt-1">Zu den Kategorien</a>
        </div>
        <div class="card" th:if="${not #lists.isEmpty(workouts)}">
            <table class="table">
                <thead>
                    <tr>
                        <th>Datum</th><th>Kategorie</th><th>Uebung</th><th>Sets</th><th>Wdh.</th><th>Gewicht</th><th>Anstrengung</th><th>Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${workouts}">
                        <td th:text="${#temporals.format(entry.workoutDate, 'dd.MM.yyyy')}"></td>
                        <td th:text="${entry.exercise.category.name}"></td>
                        <td><a th:href="@{'/workouts/exercise/' + ${entry.exercise.id}}" th:text="${entry.exercise.name}"></a></td>
                        <td th:text="${entry.sets}"></td>
                        <td th:text="${entry.reps}"></td>
                        <td th:text="${entry.weight} + ' kg'"></td>
                        <td>
                            <span class="difficulty-badge" th:classappend="'difficulty-' + ${entry.difficulty}"
                                  th:text="${entry.difficulty == 1} ? 'Einfach' : (${entry.difficulty == 2} ? 'Moderat' : (${entry.difficulty == 3} ? 'Anstrengend' : (${entry.difficulty == 4} ? 'Sehr anstrengend' : 'Nicht geschafft')))">
                            </span>
                        </td>
                        <td>
                            <form th:action="@{'/workouts/delete/' + ${entry.id}}" method="post" style="display:inline;" onsubmit="return confirm('Eintrag wirklich loeschen?');">
                                <button type="submit" class="btn btn-danger btn-sm">Loeschen</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
