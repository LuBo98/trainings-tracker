<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .category-section { margin-bottom: 1rem; }
        .category-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: var(--card-bg, #1a1a2e);
            border-radius: 0.5rem; cursor: pointer;
            border: 1px solid var(--border-color, #333);
        }
        .category-header:hover { background: var(--hover-bg, #16213e); }
        .category-toggle { font-size: 1.2rem; transition: transform 0.2s; }
        .category-toggle.open { transform: rotate(90deg); }
        .exercise-entries { display: none; margin-top: 0.5rem; padding-left: 1rem; }
        .exercise-entries.visible { display: block; }
        .exercise-group {
            margin-bottom: 1rem; padding: 0.5rem;
            background: var(--card-bg, #1a1a2e); border-radius: 0.5rem;
            border-left: 3px solid var(--primary-color, #3b82f6);
        }
        .exercise-name {
            font-weight: bold; margin-bottom: 0.5rem;
            color: var(--primary-color, #3b82f6);
        }
        .workout-entry-row {
            display: grid; grid-template-columns: auto 1fr 1fr 1fr auto;
            gap: 0.5rem; padding: 0.25rem 0;
            border-bottom: 1px solid var(--border-color, #333);
            font-size: 0.9rem;
            align-items: center;
        }
        .workout-entry-row:last-child { border-bottom: none; }
        .entry-date { color: var(--gray-500, #9ca3af); }
        .difficulty-badge {
            padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem;
        }
        .difficulty-1 { background: #16a34a; color: white; }
        .difficulty-2 { background: #ca8a04; color: white; }
        .difficulty-3 { background: #ea580c; color: white; }
        .difficulty-4 { background: #dc2626; color: white; }
        .difficulty-5 { background: #7c3aed; color: white; }

        @media (max-width: 768px) {
            .workout-entry-row {
                grid-template-columns: 1fr 1fr auto;
                gap: 0.25rem;
                padding: 0.5rem 0;
            }
            .workout-entry-row > span:nth-child(2),
            .workout-entry-row > span:nth-child(3) {
                display: contents;
            }
            .exercise-entries {
                padding-left: 0;
            }
        }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container">
        <div th:replace="~{fragments/navbar :: alerts}"></div>
        <h1 class="mb-2">Workout-Verlauf</h1>

        <div th:if="${#maps.isEmpty(categoryEntries)}" class="card text-center">
            <p>Noch keine Workouts eingetragen. Traegt dein erstes Workout ein!</p>
            <a th:href="@{/categories}" class="btn btn-primary mt-1">Zu den Kategorien</a>
        </div>

        <div th:each="catEntry : ${categoryEntries}" class="category-section">
            <div class="category-header" onclick="toggleCategory(this)">
                <div>
                    <h3 th:text="${catEntry.key.name}"></h3>
                    <small style="color:var(--gray-500, #9ca3af);">
                        <span th:text="${#maps.size(catEntry.value)}"></span> Uebungen
                    </small>
                </div>
                <span class="category-toggle">▶</span>
            </div>

            <div class="exercise-entries">
                <div th:each="exEntry : ${catEntry.value}" class="exercise-group">
                    <div class="exercise-name">
                        <a th:href="@{'/workouts/exercise/' + ${exEntry.key.id}}"
                           th:text="${exEntry.key.name}"></a>
                        <small style="color:var(--gray-500, #9ca3af);">
                            (<span th:text="${#lists.size(exEntry.value)}"></span> Eintraege)
                        </small>
                    </div>

                    <div th:each="w : ${exEntry.value}" class="workout-entry-row">
                        <span class="entry-date" th:text="${#temporals.format(w.workoutDate, 'dd.MM.yyyy')}"></span>
                        <span><span th:text="${w.sets}"></span> x <span th:text="${w.reps}"></span></span>
                        <span th:text="${w.weight} + ' kg'"></span>
                        <span>
                            <span class="difficulty-badge"
                                  th:classappend="'difficulty-' + ${w.difficulty}"
                                  th:text="${w.difficulty == 1 ? 'Einfach' : (w.difficulty == 2 ? 'Moderat' : (w.difficulty == 3 ? 'Anstrengend' : (w.difficulty == 4 ? 'Sehr anstrengend' : 'Nicht geschafft')))}"></span>
                        </span>
                        <span>
                            <a th:href="@{'/workouts/delete/' + ${w.id}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Eintrag wirklich loeschen?');">✕</a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleCategory(header) {
            const entries = header.nextElementSibling;
            const toggle = header.querySelector('.category-toggle');
            entries.classList.toggle('visible');
            toggle.classList.toggle('open');
        }
    </script>
</body>
</html>
