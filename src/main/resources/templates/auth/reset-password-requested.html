<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zuruecksetzen - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Passwort zuruecksetzen</h2>

            <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>

            <!-- Show token directly when mail not configured -->
            <div th:if="${resetToken}" class="mb-2">
                <p><strong>Dein Token:</strong></p>
                <div style="background:var(--gray-100); padding:0.75rem; border-radius:0.375rem; word-break:break-all; margin-bottom:1rem;">
                    <code th:text="${resetToken}"></code>
                </div>
                <p style="color:var(--gray-500); font-size:0.875rem;">Gueltig fuer 24 Stunden. E-Mail: <strong th:text="${resetEmail}"></strong></p>
            </div>

            <div th:if="${resetToken}">
                <form th:action="@{'/auth/reset-password/' + ${resetToken}}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label for="password">Neues Passwort</label>
                        <input type="password" id="password" name="password" class="form-control" required minlength="8" autofocus>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Passwort bestaetigen</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Passwort aendern</button>
                </form>
            </div>

            <div th:unless="${resetToken}">
                <p class="text-center mb-2">Pruefe deinen E-Mail-Posteingang fuer den Zuruecksetzungslink.</p>
            </div>

            <div class="text-center mt-2">
                <a th:href="@{/auth/login}" class="btn btn-outline btn-sm">Zurueck zur Anmeldung</a>
            </div>
        </div>
    </div>
</body>
</html>
