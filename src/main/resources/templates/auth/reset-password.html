<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neues Passwort - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Neues Passwort setzen</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{'/auth/reset-password/' + ${token}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="password">Neues Passwort</label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="8" autofocus>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Passwort bestaetigen</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Passwort aendern</button>
            </form>

            <div class="text-center mt-2">
                <a th:href="@{/auth/login}" class="btn btn-outline btn-sm">Zurueck zur Anmeldung</a>
            </div>
        </div>
    </div>
</body>
</html>
