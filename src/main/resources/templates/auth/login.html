<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/nav.js}" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Training Tracker</h2>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${logoutMessage}" class="alert alert-success" th:text="${logoutMessage}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/auth/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
                    <input type="checkbox" id="remember-me" name="remember-me" class="form-control" style="width:auto;">
                    <label for="remember-me" style="margin:0; font-size:0.9rem;">Angemeldet bleiben</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Anmelden</button>
            </form>

            <div class="text-center mt-2">
                <a th:href="@{/auth/register}" class="btn btn-outline btn-sm">Registrieren</a>
                <a th:href="@{/auth/forgot-password}" class="btn btn-outline btn-sm">Passwort vergessen?</a>
            </div>
        </div>
    </div>
</body>
</html>
