<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/nav.js}" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Passwort zuruecksetzen</h2>

            <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>

            <p class="mb-2" style="color:var(--gray-500);">
                Gib deine E-Mail-Adresse ein und wir senden dir einen Link zum Aendern deines Passworts.
            </p>

            <form th:action="@{/auth/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="email">E-Mail-Adresse</label>
                    <input type="email" id="email" name="email" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Link senden</button>
            </form>

            <div class="text-center mt-2">
                <a th:href="@{/auth/login}" class="btn btn-outline btn-sm">Zurueck zur Anmeldung</a>
            </div>
        </div>
    </div>
</body>
</html>
