<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorien - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" th:href="@{/dashboard}">Training Tracker</a>
        <ul class="navbar-nav">
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/categories}">Kategorien</a></li>
            <li><a th:href="@{/workouts}">Workouts</a></li>
            <li><a th:href="@{/stats}">Statistik</a></li>
            <li><form th:action="@{/auth/logout}" method="post" style="display:inline;"><button type="submit" class="btn btn-outline btn-sm">Logout</button></form></li>
        </ul>
    </nav>
    <div class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="d-flex justify-between align-center mb-2">
            <h1>Kategorien</h1>
            <a th:href="@{/categories/new}" class="btn btn-primary">+ Neue Kategorie</a>
        </div>
        <div th:if="${categories.isEmpty()}" class="card text-center">
            <p>Noch keine Kategorien vorhanden. Erstelle deine erste Kategorie!</p>
        </div>
        <div th:each="category : ${categories}" class="card">
            <div class="d-flex justify-between align-center">
                <div>
                    <h3 th:text="${category.name}"></h3>
                    <p th:if="${category.description}" th:text="${category.description}" style="color:var(--gray-500);"></p>
                    <small style="color:var(--gray-500);"><span th:text="${#lists.size(category.exercises)}"></span> Uebungen</small>
                </div>
                <div class="d-flex gap-1">
                    <a th:href="@{'/exercises/category/' + ${category.id}}" class="btn btn-outline btn-sm">Uebungen</a>
                    <a th:href="@{'/categories/edit/' + ${category.id}}" class="btn btn-outline btn-sm">Bearbeiten</a>
                    <form th:action="@{'/categories/delete/' + ${category.id}}" method="post" style="display:inline;" onsubmit="return confirm('Kategorie wirklich loeschen? Alle Uebungen und Workouts werden ebenfalls geloescht.');">
                        <button type="submit" class="btn btn-danger btn-sm">Loeschen</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
