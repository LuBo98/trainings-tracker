<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id != null} ? 'Kategorie bearbeiten' : 'Neue Kategorie'">Kategorie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container">
        <h1 class="mb-2" th:text="${category.id != null} ? 'Kategorie bearbeiten' : 'Neue Kategorie'"></h1>
        <div class="card">
            <form th:action="${category.id != null} ? @{'/categories/update/' + ${category.id}} : @{/categories}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control" required maxlength="100" autofocus th:value="${category.id != null} ? ${category.name} : ''">
                    <small style="color:var(--gray-500);">z.B. Oberkoerper, Unterkoeper, Cardio</small>
                </div>
                <div class="form-group">
                    <label for="description">Beschreibung (optional)</label>
                    <textarea id="description" name="description" class="form-control" maxlength="500" th:text="${category.id != null} ? ${category.description} : ''"></textarea>
                </div>
                <div class="d-flex gap-1">
                    <button type="submit" class="btn btn-primary"><span th:text="${category.id != null} ? 'Speichern' : 'Erstellen'"></span></button>
                    <a th:href="@{/categories}" class="btn btn-outline">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
