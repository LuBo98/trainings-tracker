<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uebungen - Training Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="container">
        <div th:replace="~{fragments/navbar :: alerts}"></div>
        <div class="d-flex justify-between align-center mb-2">
            <div>
                <a th:href="@{/categories}" style="color:var(--gray-500); text-decoration:none;">Kategorien</a>
                <span style="color:var(--gray-500);"> / </span>
                <h1 style="display:inline;" th:text="${category.name}"></h1>
            </div>
            <div class="d-flex gap-1">
                <a th:href="@{'/workouts/bulk?categoryId=' + ${category.id}}" class="btn btn-success">+ Bulk Workout</a>
                <a th:href="@{'/exercises/new?categoryId=' + ${category.id}}" class="btn btn-primary">+ Neue Uebung</a>
            </div>
        </div>
        <div th:if="${exercises.isEmpty()}" class="card text-center">
            <p>Noch keine Uebungen in dieser Kategorie. Fuege deine erste Uebung hinzu!</p>
        </div>
        <div th:each="exercise : ${exercises}" class="card">
            <div class="d-flex justify-between align-center">
                <div>
                    <h3 th:text="${exercise.name}"></h3>
                    <p th:if="${exercise.description}" th:text="${exercise.description}" style="color:var(--gray-500);"></p>
                    <small style="color:var(--gray-500);"><span th:text="${#lists.size(exercise.workoutEntries)}"></span> Eintraege</small>
                </div>
                <div class="d-flex gap-1">
                    <a th:href="@{'/workouts/log?exerciseId=' + ${exercise.id}}" class="btn btn-success btn-sm">Workout eintragen</a>
                    <a th:href="@{'/workouts/exercise/' + ${exercise.id}}" class="btn btn-outline btn-sm">Verlauf</a>
                    <a th:href="@{'/exercises/edit/' + ${exercise.id}}" class="btn btn-outline btn-sm">Bearbeiten</a>
                    <form th:action="@{'/exercises/delete/' + ${exercise.id}}" method="post" style="display:inline;" onsubmit="return confirm('Uebung wirklich loeschen? Alle Workouts werden ebenfalls geloescht.');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger btn-sm">Loeschen</button>
                    </form>
                </div>
            </div>
        </div>
        <a th:href="@{/categories}" class="btn btn-outline mt-2">Zurueck zu Kategorien</a>
    </div>
</body>
</html>
