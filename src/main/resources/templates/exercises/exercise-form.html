<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${exercise.id != null} ? 'Uebung bearbeiten' : 'Neue Uebung'">Uebung</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" th:href="@{/dashboard}">Training Tracker</a>
        <ul class="navbar-nav">
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/categories}">Kategorien</a></li>
            <li><a th:href="@{/workouts}">Workouts</a></li>
            <li><a th:href="@{/stats}">Statistik</a></li>
            <li><form th:action="@{/auth/logout}" method="post" style="display:inline;"><button type="submit" class="btn btn-outline btn-sm">Logout</button></form></li>
        </ul>
    </nav>
    <div class="container">
        <h1 class="mb-2" th:text="${exercise.id != null} ? 'Uebung bearbeiten' : 'Neue Uebung'"></h1>
        <div class="card">
            <form th:action="${exercise.id != null} ? @{'/exercises/update/' + ${exercise.id}} : @{/exercises}" method="post">
                <input type="hidden" name="categoryId" th:value="${category != null} ? ${category.id} : ${exercise.category.id}">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control" required maxlength="100" autofocus th:value="${exercise.id != null} ? ${exercise.name} : ''">
                    <small style="color:var(--gray-500);">z.B. Bankdruecken, Kniebeugen, Kreuzheben</small>
                </div>
                <div class="form-group">
                    <label for="description">Beschreibung (optional)</label>
                    <textarea id="description" name="description" class="form-control" maxlength="500" th:text="${exercise.id != null} ? ${exercise.description} : ''"></textarea>
                </div>
                <div class="d-flex gap-1">
                    <button type="submit" class="btn btn-primary"><span th:text="${exercise.id != null} ? 'Speichern' : 'Erstellen'"></span></button>
                    <a th:href="${exercise.id != null} ? @{'/exercises/category/' + ${exercise.category.id}} : @{/categories}" class="btn btn-outline">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
